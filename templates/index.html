<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic 8-Ball</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #00bcd4;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0097a7;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        .question {
            font-size: 15px;
            color: #d9d9d9;
        }

        .answer {
            font-size: 22px;
            font-weight: bold;
            margin-top: 10px;
            color: #ffd54f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎱 Magic 8-Ball</h1>
        <form method="POST">
            <input type="text" name="question" placeholder="Ask a Yes/No question" required>
            <br>
            <button type="submit">Ask the 8-Ball</button>
        </form>

        {% if question and answer %}
        <div class="result">
            <div class="question"><strong>Your question:</strong> {{ question }}</div>
            <div class="answer">{{ answer }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
